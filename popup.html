<!DOCTYPE html>
<html>
<head>
  <title>Voxlocal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 340px;
      background: #1a1a2e;
      color: #e6e6e6;
      padding: 12px;
    }

    /* ─── Status Bar ─── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #16213e;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      min-height: 36px;
    }
    .status-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #666;
      flex-shrink: 0;
    }
    .status-dot.playing { background: #2ecc71; animation: blink 1.5s infinite; }
    .status-dot.paused  { background: #f39c12; }
    .status-dot.loading { background: #3498db; animation: blink 0.6s infinite; }
    .status-dot.error   { background: #e74c3c; }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .status-text {
      font-size: 12px;
      color: #aaa;
    }
    .chunk-info {
      font-size: 11px;
      color: #666;
    }

    /* ─── Controls ─── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #16213e;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      position: relative;
    }
    .btn {
      background: #0f3460;
      color: #e6e6e6;
      border: none;
      border-radius: 50%;
      width: 36px; height: 36px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      padding: 0;
    }
    .btn:hover:not(:disabled) {
      background: #e94560;
      transform: scale(1.08);
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn.play-btn {
      width: 42px; height: 42px;
      font-size: 16px;
    }
    .btn.skip-btn {
      width: 34px; height: 34px;
      font-size: 11px;
      border-radius: 6px;
    }
    .btn.skip-btn svg {
      width: 16px; height: 16px;
      fill: currentColor;
    }
    .btn-divider {
      width: 1px;
      height: 24px;
      background: #0f3460;
      margin: 0 2px;
    }

    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(22, 33, 62, 0.9);
      border-radius: 8px;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .loading-overlay.visible { display: flex; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(233, 69, 96, 0.2);
      border-radius: 50%;
      border-top-color: #e94560;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Seek Bar ─── */
    .seek-section {
      background: #16213e;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .seek-bar {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      background: #0f3460;
      border-radius: 2px;
      outline: none;
      margin-bottom: 4px;
    }
    .seek-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #e94560;
      cursor: pointer;
    }
    .seek-bar:disabled::-webkit-slider-thumb {
      background: #444;
      cursor: not-allowed;
    }
    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #666;
    }

    /* ─── Settings Section ─── */
    .settings-section {
      background: #16213e;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .setting-row {
      margin-bottom: 10px;
    }
    .setting-row:last-child { margin-bottom: 0; }
    .setting-row label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #ccc;
    }
    select, input[type="text"], input[type="number"] {
      width: 100%;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid #0f3460;
      background: #1a1a2e;
      color: #e6e6e6;
      font-size: 13px;
      outline: none;
    }
    select:focus, input:focus {
      border-color: #e94560;
    }

    .voice-row {
      display: flex;
      gap: 6px;
    }
    .voice-row select { flex: 1; }
    .voice-row .btn-sm {
      background: #0f3460;
      border: none;
      color: #e6e6e6;
      border-radius: 4px;
      width: 30px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }
    .voice-row .btn-sm:hover { background: #e94560; }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .slider-row input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      background: #0f3460;
      border-radius: 2px;
      outline: none;
    }
    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #e94560;
      cursor: pointer;
    }
    .speed-val {
      min-width: 36px;
      text-align: right;
      font-size: 13px;
      font-weight: 600;
      color: #e94560;
    }

    /* ─── PDF Section ─── */
    .pdf-section {
      background: #16213e;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: none;
    }
    .pdf-section.visible { display: block; }
    .pdf-section h3 {
      font-size: 12px;
      color: #ccc;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .pdf-range {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .pdf-range input[type="number"] {
      width: 60px;
      text-align: center;
    }
    .pdf-range span {
      font-size: 12px;
      color: #888;
    }
    .btn-read-pdf {
      width: 100%;
      background: #0f3460;
      color: #e6e6e6;
      border: none;
      border-radius: 4px;
      padding: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-read-pdf:hover { background: #e94560; }

    /* ─── Footer ─── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer a {
      font-size: 11px;
      color: #666;
      text-decoration: none;
      cursor: pointer;
    }
    .footer a:hover { color: #e94560; }

    /* ─── Error Banner ─── */
    .error-banner {
      background: rgba(231, 76, 60, 0.15);
      border: 1px solid rgba(231, 76, 60, 0.3);
      color: #e74c3c;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 10px;
      display: none;
      word-break: break-word;
    }
    .error-banner.visible { display: block; }

    /* ─── Server status ─── */
    .server-status {
      font-size: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .server-status .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #666;
    }
    .server-status .dot.ok { background: #2ecc71; }
    .server-status .dot.err { background: #e74c3c; }
  </style>
</head>
<body>
  <!-- Error Banner -->
  <div class="error-banner" id="errorBanner"></div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-left">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Ready</span>
    </div>
    <span class="chunk-info" id="chunkInfo"></span>
  </div>

  <!-- Playback Controls -->
  <div class="controls">
    <button class="btn skip-btn" id="prevBtn" title="Previous chunk" disabled>
      <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" transform="scale(-1,1) translate(-24,0)"/></svg>
    </button>
    <button class="btn play-btn" id="playBtn" title="Play">&#9654;</button>
    <button class="btn" id="pauseBtn" title="Pause" disabled>&#10074;&#10074;</button>
    <button class="btn" id="stopBtn" title="Stop">&#9724;</button>
    <button class="btn skip-btn" id="nextBtn" title="Next chunk" disabled>
      <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
    </button>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Seek Bar -->
  <div class="seek-section">
    <input type="range" class="seek-bar" id="seekBar" min="0" max="100" value="0" step="0.1" disabled>
    <div class="time-row">
      <span id="currentTime">0:00</span>
      <span id="duration">0:00</span>
    </div>
  </div>

  <!-- Settings -->
  <div class="settings-section">
    <div class="setting-row">
      <label for="voice">Voice</label>
      <div class="voice-row">
        <select id="voice">
          <option value="af_heart">af_heart (default)</option>
        </select>
        <button class="btn-sm" id="refreshVoicesBtn" title="Refresh voice list">&#8635;</button>
      </div>
    </div>

    <div class="setting-row">
      <label for="speed">Speed</label>
      <div class="slider-row">
        <input type="range" id="speed" min="0.5" max="3.0" step="0.1" value="1.0">
        <span class="speed-val" id="speedVal">1.0x</span>
      </div>
    </div>
  </div>

  <!-- PDF Section (shown only on PDF pages) -->
  <div class="pdf-section" id="pdfSection">
    <h3>PDF Reader</h3>
    <div class="pdf-range">
      <span>Pages</span>
      <input type="number" id="pdfPageStart" value="1" min="1">
      <span>to</span>
      <input type="number" id="pdfPageEnd" value="" placeholder="end">
    </div>
    <button class="btn-read-pdf" id="readPdfBtn">Read PDF</button>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="server-status">
      <div class="dot" id="serverDot"></div>
      <span id="serverLabel">Checking...</span>
    </div>
    <a id="settingsLink">Settings</a>
  </div>

  <script src="utils/audioPlayer.js"></script>
  <script src="constants.js"></script>
  <script src="popup.js"></script>
</body>
</html>
