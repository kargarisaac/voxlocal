services:
  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:v0.2.4
    container_name: kokoro-tts
    restart: unless-stopped
    ports:
      - "8880:8880"
    environment:
      - ONNX_NUM_THREADS=8
      - ONNX_INTER_OP_THREADS=4
      - ONNX_EXECUTION_MODE=parallel
      - ONNX_OPTIMIZATION_LEVEL=all
      - ONNX_MEMORY_PATTERN=true
      - ONNX_ARENA_EXTEND_STRATEGY=kNextPowerOfTwo
      - CORS_ORIGINS=["*"]
      - CORS_ENABLED=true
      - API_LOG_LEVEL=INFO

  kittentts:
    build:
      context: ./kittentts-server
      dockerfile: Dockerfile
    container_name: kittentts
    restart: unless-stopped
    ports:
      - "8881:8881"
    environment:
      - HOST=0.0.0.0
      - PORT=8881
      - MODEL_NAME=KittenML/kitten-tts-mini-0.8
    volumes:
      - kittentts-cache:/home/appuser/.cache

volumes:
  kittentts-cache:
