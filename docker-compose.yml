services:
  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:v0.2.4
    container_name: kokoro-tts
    restart: unless-stopped
    ports:
      - "8880:8880"
    environment:
      - ONNX_NUM_THREADS=8
      - ONNX_INTER_OP_THREADS=4
      - ONNX_EXECUTION_MODE=parallel
      - ONNX_OPTIMIZATION_LEVEL=all
      - ONNX_MEMORY_PATTERN=true
      - ONNX_ARENA_EXTEND_STRATEGY=kNextPowerOfTwo
      - CORS_ORIGINS=["*"]
      - CORS_ENABLED=true
      - API_LOG_LEVEL=INFO

  kittentts:
    build:
      context: ./servers/kittentts
      dockerfile: Dockerfile
    container_name: kittentts
    restart: unless-stopped
    ports:
      - "8881:8881"
    environment:
      - HOST=0.0.0.0
      - PORT=8881
      - MODEL_NAME=KittenML/kitten-tts-mini-0.8
    volumes:
      - kittentts-cache:/home/appuser/.cache

  chat-server:
    build:
      context: ./servers/chat
      dockerfile: Dockerfile
    container_name: voxlocal-chat
    restart: unless-stopped
    ports:
      - "8882:8882"
    environment:
      - HOST=0.0.0.0
      - PORT=8882
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/v1
      - MODEL_NAME=qwen3.5:35b
      - WORKSPACES_DIR=/workspaces
      - MAX_HISTORY_TURNS=50
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOME}/.voxlocal/workspaces:/workspaces

volumes:
  kittentts-cache:
